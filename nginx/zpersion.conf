server {
    listen 80;
    listen [::]:80;
    server_name _;

    # __PROJECT_DIR__ 会在 deploy.sh 部署时被 sed 替换为真实项目根
    root __PROJECT_DIR__/frontend/dist;
    index index.html;

    access_log /var/log/nginx/zpersion_access.log;
    error_log  /var/log/nginx/zpersion_error.log;

    # 前端 SPA 路由：所有未匹配路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理到 gunicorn
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 静态资源 1 年强缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 隐藏文件
    location ~ /\. {
        deny all;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
